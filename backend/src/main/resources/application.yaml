spring:
  application:
    name: nju-market
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/nju_market?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

server:
  port: 8080

market:
  avatar:
    upload-dir: D:/upload/avatar
    public-path: /uploads/avatars/
  goods-image:
    upload-dir: D:/upload/goods
    public-path: /uploads/goods/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto


